<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>환이의 출결 시스템!!</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
        <style>
            :root {
                --bg-color: #f8fafc;
                --card-bg: #ffffff;
                --text-main: #1e293b;
                --text-muted: #64748b;
                --border-color: #f1f5f9;
                --primary: #4f46e5;
                --primary-hover: #4338ca;
                --danger: #f43f5e;
                --danger-hover: #e11d48;
                
                --badge-present-bg: #dcfce7;
                --badge-present-text: #166534;
                --badge-late-bg: #fef9c3;
                --badge-late-text: #854d0e;
                --badge-absent-bg: #fee2e2;
                --badge-absent-text: #991b1b;
                --badge-default-bg: #f1f5f9;
                --badge-default-text: #475569;
            }

            body {
                font-family: 'Inter', 'Noto Sans KR', sans-serif;
                background-color: var(--bg-color);
                color: var(--text-main);
                margin: 0;
                padding: 50px 20px;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                box-sizing: border-box;
            }

            .contain {
                width: 100%;
                max-width: 900px;
                background: var(--card-bg);
                padding: 40px;
                border-radius: 24px;
                box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            }

            h1 {
                text-align: left;
                font-size: 28px;
                font-weight: 700;
                margin-top: 0;
                margin-bottom: 24px;
                color: var(--text-main);
                letter-spacing: -0.5px;
                display: flex;
                align-items: center;
                gap: 8px;
            }

            h1::before {
                content: '';
                display: inline-block;
                width: 6px;
                height: 24px;
                background-color: var(--primary);
                border-radius: 4px;
            }

            .table-wrapper {
                width: 100%;
                border-radius: 16px;
                border: 1px solid var(--border-color);
                overflow: hidden;
                background: var(--card-bg);
                margin-bottom: 24px;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                text-align: left;
            }

            th {
                background-color: #f8fafc;
                color: var(--text-muted);
                font-weight: 600;
                font-size: 14px;
                padding: 16px 20px;
                border-bottom: 1px solid var(--border-color);
            }

            td {
                padding: 18px 20px;
                font-size: 15px;
                color: var(--text-main);
                border-bottom: 1px solid var(--border-color);
            }

            tr:last-child td {
                border-bottom: none;
            }

            tr:hover {
                background-color: #fafafa;
            }

            .badge {
                display: inline-flex;
                align-items: center;
                padding: 6px 12px;
                border-radius: 9999px;
                font-size: 12px;
                font-weight: 600;
                line-height: 1;
            }
            .summary {
                display: flex;
                gap: 15px;
                margin-bottom: 24px;
            }

            .summary-card {
                background: #f8fafc;
                border: 1px solid var(--border-color);
                border-radius: 16px;
                padding: 16px 24px;
            }

            .summary-title {
                color: var(--text-muted);
                font-size: 13px;
                margin-bottom: 6px;
            }

            .summary-value {
                font-size: 24px;
                font-weight: 700;
                color: var(--primary);
            }

            .badge.present { background-color: var(--badge-present-bg); color: var(--badge-present-text); }
            .badge.late { background-color: var(--badge-late-bg); color: var(--badge-late-text); }
            .badge.absent { background-color: var(--badge-absent-bg); color: var(--badge-absent-text); }
            .badge.default { background-color: var(--badge-default-bg); color: var(--badge-default-text); }

            .action-bar {
                display: flex;
                justify-content: flex-end;
            }

            a {
                text-decoration: none;
            }

            button {
                padding: 12px 24px;
                border: none;
                border-radius: 12px;
                background-color: var(--danger);
                color: white;
                cursor: pointer;
                font-size: 15px;
                font-weight: 500;
                display: flex;
                align-items: center;
                gap: 6px;
                transition: all 0.2s ease-in-out;
            }

            button:hover {
                background-color: var(--danger-hover);
                transform: translateY(-1px);
                box-shadow: 0 4px 12px rgba(244, 63, 94, 0.2);
            }

            button:active {
                transform: translateY(0);
            }
        </style>
    </head>
    <body>
        <div class="contain">
            <h1>출결 현황</h1>
            <div class="summary">
                <div class="summary-card">
                    <div class="summary-title">출석 인원</div>
                    <div class="summary-value">
                        <span id="total-count">0</span> 명
                    </div>
                </div>
            
                <div class="summary-card">
                    <div class="summary-title">전체 인원</div>
                    <div class="summary-value">
                        <span id="total-value">0</span> 명
                    </div>
                </div>
            </div>
            
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>학번</th>
                            <th>이름</th>
                            <th>시간</th>
                            <th>상태</th>
                        </tr>
                    </thead>
                    <tbody id="attendance-table">
                        {% for row in rows %}
                        <tr>
                            <td>{{ row[0] }}</td>
                            <td>{{ row[1] }}</td>
                            <td>{{ row[2] }}</td>
                            <td><span class="badge" data-status="{{ row[3] }}">{{ row[3] }}</span></td>
                        </tr>
                        {% endfor %}
                    </tbody>    
                </table>
            </div>

            <div class="action-bar">
                <a href="/clear">
                    <button>
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        출결 초기화
                    </button>
                </a>
            </div>

            <script>
                function getBadgeClass(status) {
                    if (!status) return 'default';
                    if (status.includes('출석')) return 'present';
                    if (status.includes('지각')) return 'late';
                    if (status.includes('결석')) return 'absent';
                    return 'default';
                }

                function styleExistingBadges() {
                    document.querySelectorAll('.badge').forEach(badge => {
                        const status = badge.getAttribute('data-status');
                        badge.classList.add(getBadgeClass(status));
                    });
                }

                function ref(){
                    fetch('/ref')
                    .then(response => response.json())
                    .then(data => {
                        let table = document.getElementById("attendance-table");
                        table.innerHTML = "";
                        data.attendance.forEach(row => {
                            let tr = document.createElement('tr');
                            let badgeClass = getBadgeClass(row.status);
                            
                            tr.innerHTML = `
                            <td>${row.student_id}</td>
                            <td>${row.name}</td>
                            <td>${row.time}</td>
                            <td><span class="badge ${badgeClass}">${row.status}</span></td>`;
                            table.appendChild(tr);
                        })
                        document.getElementById("total-value").innerText = data.total;
                        document.getElementById("total-count").innerText = data.attendance.length;
                    })
                    .catch(err => console.error("데이터 갱신 실패:", err));
                }

                styleExistingBadges();
                ref();
                setInterval(ref, 5000);
            </script>
        </div>
    </body>
</html>
